version: "3.9"

services:
  # ── LLM Service ──
  ollama:
    image: ollama/ollama:latest
    container_name: ggssgs251-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Pull required models on startup via an init script
    entrypoint: >
      sh -c "
      echo 'Starting Ollama server...' &&
      ollama serve &
      sleep 5 &&
      echo 'Pulling llama3.1...' &&
      ollama pull llama3.1 &&
      echo 'Pulling nomic-embed-text...' &&
      ollama pull nomic-embed-text &&
      echo 'Models ready!' &&
      wait
      "
    networks:
      - ggssgs251-net

  # ── Backend API ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ggssgs251-backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.1
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-a-real-secret}
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - ggssgs251-net

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ggssgs251-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - ggssgs251-net

networks:
  ggssgs251-net:
    driver: bridge

volumes:
  ollama_data:
    name: ggssgs251_ollama_data
  backend_data:
    name: ggssgs251_backend_data
